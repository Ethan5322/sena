# Sena's voice stack, on one machine. `docker compose up`.
#
# Two containers, both free, neither phoning home:
#
#   livekit   the webRTC server. Carries the audio between the guest's browser
#             and the bot. This is what replaced Twilio.
#   agent     the switchboard + one bot process per call. Whisper, Claude and
#             Piper live in here. This is what replaced Vapi and ElevenLabs.
#
# The third piece — the Node API with the router, the gates and the database —
# runs OUTSIDE compose, with `npm run dev`. That is deliberate: it is the part
# that goes to Vercel in production, and running it the same way locally means
# you are testing the thing you ship.
#
#   host.docker.internal is how the agent container reaches `npm run dev` on your
#   laptop. On Linux it needs the extra_hosts line below; on macOS and Windows
#   Docker provides it.

services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml --node-ip ${LIVEKIT_NODE_IP:-127.0.0.1}
    # LIVEKIT_NODE_IP is the address LiveKit advertises to browsers for the
    # media connection. 127.0.0.1 only works for a browser on this machine; a
    # phone on the same WiFi needs the PC's LAN IP, and a real server needs its
    # public IP — or nobody can hear anything. It is the single most common
    # reason a self-hosted LiveKit "connects" and stays silent.
    restart: unless-stopped
    ports:
      - "7880:7880"            # signalling (webRTC handshake, HTTP)
      - "7881:7881"            # TCP fallback for media, for guests behind hard NATs
      - "50000-50060:50000-50060/udp"  # the media itself
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  agent:
    build:
      context: ./voice-agent
      dockerfile: agent/Dockerfile
    restart: unless-stopped
    depends_on:
      - livekit
    ports:
      - "8080:8080"            # the switchboard, and the Call Reception page
    environment:
      # ── Where the brain is ─────────────────────────────────────────────────
      # `npm run dev` on the host. In production this is your Vercel URL.
      SENA_API_URL: ${SENA_API_URL:-http://host.docker.internal:3000}
      SENA_WEBHOOK_SECRET: ${SENA_WEBHOOK_SECRET:?set it in .env.local}
      SENA_DEFAULT_HOTEL_ID: ${SENA_DEFAULT_HOTEL_ID:-}

      # ── Where the audio is ─────────────────────────────────────────────────
      # Two addresses for one server. The BOT dials the docker-network address;
      # the BROWSER (via /connect) is told the host-published one, because the
      # guest's laptop cannot resolve "livekit". Collapse them and one party
      # always dials a number that does not exist for it.
      # Overridable so the same compose runs against LiveKit CLOUD (set
      # LIVEKIT_URL=wss://your-project.livekit.cloud in .env.local and the bot
      # dials out to it; the local livekit container just idles).
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret-at-least-32-characters-long}

      # ── The brain, the ears, the voice ─────────────────────────────────────
      # LLM_PROVIDER=anthropic needs the key; LLM_PROVIDER=ollama needs Ollama
      # running on the host (it is a native app, outside docker, so the small
      # model is not fighting the containers for the WSL VM's memory). The
      # container reaches it through host.docker.internal.
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # LLM_PROVIDER=openai → any OpenAI-compatible host. The point is the free
      # tiers: Groq serves Llama 3.3 70B at real speed for R0 (see .env.example).
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      PIPER_VOICE: ${PIPER_VOICE:-/voices/en_GB-cori-medium.onnx}

      SENA_ALLOWED_ORIGINS: ${SENA_ALLOWED_ORIGINS:-*}
      # /connect spawns one bot process per call; uncapped, it is a fork bomb
      # with a public URL. A sixth simultaneous caller hears "lines busy".
      SENA_MAX_CALLS: ${SENA_MAX_CALLS:-5}
    extra_hosts:
      # Linux only; harmless on macOS and Windows.
      - "host.docker.internal:host-gateway"
