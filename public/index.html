<!doctype html>
<!--
  The deployment's front door. Before this file existed, the root of the Vercel
  deployment was a bare 404 — technically correct (every real page lives under
  /api/sena/*) and completely indistinguishable from a broken deploy. A person
  checking "is it up?" deserves a page that says so and points at the doors.

  This also pins Vercel's static output to public/ — without it, an app with no
  framework serves the repository root, which is nobody's intention.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Sena — AI Front Desk</title>
<style>
  :root { --ink:#0B1220; --accent:#C8A24B; --paper:#F7F5F2; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100dvh; display:grid; place-items:center;
         background:var(--paper); color:var(--ink);
         font:16px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif; }
  main { width:min(26rem,92vw); text-align:center; padding:2rem; }
  .orb { width:64px; height:64px; margin:0 auto 1.5rem; border-radius:50%;
         background:var(--accent); opacity:.9; }
  h1 { font-size:1.5rem; margin:0 0 .3rem; letter-spacing:-.01em; }
  p  { color:#6B7280; margin:0 0 2rem; font-size:.95rem; }
  a.btn { display:block; margin-top:.8rem; padding:.95rem 1.25rem; border-radius:999px;
          text-decoration:none; font-weight:600; font-size:1rem;
          background:var(--ink); color:#fff; }
  a.btn.ghost { background:#fff; color:var(--ink); border:1px solid #D6D9E0; }
  footer { margin-top:2.5rem; padding-top:1.2rem; border-top:1px solid #E5E7EB;
           font-size:.78rem; color:#9CA3AF; }
</style>
</head>
<body>
<main>
  <div class="orb"></div>
  <h1>Sena — AI Front Desk</h1>
  <p>The system is up. Guests arrive through the hotel's reception page;
     these are the working doors.</p>

  <a class="btn" href="/api/sena/checkin">Guest check-in — enter your code</a>
  <a class="btn ghost" href="/api/sena/desk">Front desk — staff scanner</a>

  <footer>Built by MuleSoo Digital Services · mulesoo.com</footer>
</main>
</body>
</html>
